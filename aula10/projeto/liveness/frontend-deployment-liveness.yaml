---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: frontend
  name: frontend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - image: docker-registry:5000/4linux-php:latest
        imagePullPolicy: IfNotPresent
        name: 4linux-php
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: frontend-configmaps
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: frontend-configmaps
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: frontend-configmaps
              key: DB_USER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: frontend-configmaps
              key: DB_NAME
        - name: PHP_INI
          valueFrom:
            configMapKeyRef:
              name: frontend-configmaps
              key: PHP_INI
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: frontend-secrets
              key: DB_PASS
        livenessProbe:
          httpGet:
            path: /login.php
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 3
        volumeMounts:
        - name: frontend-claim-nfs
          mountPath: "/app"
        - name: config-volume-php
          mountPath: "/app/php-ini/"
      initContainers:
      - image: alpine/git:2.40.1
        imagePullPolicy: IfNotPresent
        name: git
        command:
        - sh
        - -c
        - |
          app_ok() {
            [ -e "/app/latest" ] &&
            [ -d "/app/fonts/font-awesome-4.7.0" ] &&
            [ -d "/app/fonts/iconic" ] &&
            [ -d "/app/fonts/poppins" ]
          }

          if ! app_ok; then
            echo "Aplicação latest incompleta ou versão diferente no volume. Preparando clone..."

            tentativas=0

            while ! mkdir /app/.git-clone-lock 2>/dev/null; do
              if app_ok; then
                echo "Aplicação latest já foi corrigida por outro Pod."
                exit 0
              fi

              tentativas=$((tentativas + 1))

              if [ "$tentativas" -ge 150 ]; then
                echo "Timeout aguardando liberação do lock."
                exit 1
              fi

              echo "Outro Pod está populando o volume. Aguardando..."
              sleep 2
            done

            trap 'rm -rf /app/.git-clone-lock' EXIT

            if app_ok; then
              echo "Aplicação latest já está completa."
              exit 0
            fi

            rm -rf /tmp/4linux-php

            echo "Clonando repositório latest..."
            git clone https://github.com/4linux/4linux-php.git /tmp/4linux-php

            echo "Limpando volume antigo..."
            find /app -mindepth 1 -maxdepth 1 ! -name ".git-clone-lock" -exec rm -rf {} +

            echo "Copiando arquivos para /app..."
            cp -a /tmp/4linux-php/. /app/

            echo "Validando aplicação latest..."
            app_ok

            echo "Aplicação latest atualizada com sucesso."
          else
            echo "Aplicação latest já está completa no volume."
          fi
        volumeMounts:
        - name: frontend-claim-nfs
          mountPath: /app
      volumes:
        - name: config-volume-php
          configMap:
            name: php-config
        - name: frontend-claim-nfs
          persistentVolumeClaim:
            claimName: frontend-claim-nfs
      imagePullSecrets:
      - name: regcred
